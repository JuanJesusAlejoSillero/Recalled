services:
  redis:
    image: redis:8-alpine
    container_name: recalled-redis-dev
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    volumes:
      - ./redis-data-dev:/data
    expose:
      - "6379"
    networks:
      - recalled-network-dev

  # Backend - API Flask
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        APP_VERSION: ${APP_VERSION:-dev}
    container_name: recalled-backend-dev
    restart: unless-stopped
    environment:
      - FLASK_ENV=production
      - "SECRET_KEY=${SECRET_KEY:?ERROR: SECRET_KEY is required. Generate one with: python -c import secrets; print(secrets.token_hex(32))}"
      - "JWT_SECRET_KEY=${JWT_SECRET_KEY:?ERROR: JWT_SECRET_KEY is required. Generate one with: python -c import secrets; print(secrets.token_hex(32))}"
      - "DATABASE_URL=${DATABASE_URL:-sqlite:////app/data/reviews.db}"
      - "UPLOAD_FOLDER=${UPLOAD_FOLDER:-/app/uploads}"
      - "MAX_CONTENT_LENGTH=${MAX_CONTENT_LENGTH:-52428800}"
      - "ALLOWED_EXTENSIONS=${ALLOWED_EXTENSIONS:-jpg,jpeg,png,webp}"
      - "ADMIN_USERNAME=${ADMIN_USERNAME:-admin}"
      - "ADMIN_PASSWORD=${ADMIN_PASSWORD:?ERROR: ADMIN_PASSWORD is required. Set a strong password in .env}"
      - "CORS_ORIGINS=${CORS_ORIGINS:-https://localhost}"
      - "PROXY_FIX_X_FOR=${PROXY_FIX_X_FOR:-1}"
      - "AUTH_LOGIN_RATE_LIMIT=${AUTH_LOGIN_RATE_LIMIT:-5/minute}"
      - "AUTH_2FA_RATE_LIMIT=${AUTH_2FA_RATE_LIMIT:-10/minute}"
      - "AUTH_REFRESH_RATE_LIMIT=${AUTH_REFRESH_RATE_LIMIT:-30/minute}"
      - "RATELIMIT_STORAGE_URI=${RATELIMIT_STORAGE_URI:-redis://redis:6379/0}"
      - "JWT_COOKIE_SECURE=${JWT_COOKIE_SECURE:-true}"
      - "JWT_COOKIE_SAMESITE=${JWT_COOKIE_SAMESITE:-Lax}"
    volumes:
      - ./data-dev:/app/data
      - ./uploads-dev:/app/uploads
      - ./logs-dev:/app/logs
    expose:
      - "5000"
    networks:
      - recalled-network-dev
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend - React + Nginx
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: recalled-frontend-dev
    restart: unless-stopped
    environment:
      - VITE_API_URL=${VITE_API_URL:-/api/v1}
      - ENABLE_MAP=${ENABLE_MAP:-true}
    ports:
      - "${APP_DEV_PORT:-8091}:80"
    depends_on:
      - backend
    networks:
      - recalled-network-dev
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  recalled-network-dev:
    driver: bridge
